<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Poker Timer</title>

<!-- ✅ PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icon.png">

<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  touch-action: manipulation;
}

#time {
  font-size:240px;
  color:red;
  font-family:'Digital-7 Mono', monospace;
}

.blink {
  animation: blink 1s step-start infinite;
}
@keyframes blink {
  50% { opacity: 0; }
}

.flip {
  transform: rotate(180deg);
}

.controls {
  position:absolute;
  bottom:20px;
}

button {
  font-size:22px;
  padding:10px 18px;
  margin:5px;
  border:none;
  border-radius:10px;
}

.active {
  background:red;
  color:white;
}
</style>
</head>

<body>

<div id="time">30</div>

<div class="controls">
  <button onclick="selectTime(15, event)">15</button>
  <button onclick="selectTime(20, event)">20</button>
  <button onclick="selectTime(30, event)" class="active">30</button>
  <button onclick="togglePause(event)" id="pauseBtn">Pause</button>
</div>

<script>
let defaultTime = 30;
let time = defaultTime;
let interval = null;
let running = false;

function update() {
  const el = document.getElementById("time");
  el.innerText = time.toString().padStart(2,'0');

  if (time <= 5 && time > 0) el.classList.add("blink");
  else el.classList.remove("blink");
}

function startTimer() {
  clearInterval(interval);

  running = true;
  interval = setInterval(() => {
    if (time > 0) {
      time--;
      update();
    } else {
      time = defaultTime;
      update();
    }
  }, 1000);

  document.getElementById("pauseBtn").innerText = "Pause";
}

function pauseTimer() {
  clearInterval(interval);
  running = false;
  document.getElementById("pauseBtn").innerText = "Resume";
}

function togglePause(e) {
  e.stopPropagation();

  if (running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

// tap หน้าจอ = restart
document.body.addEventListener("click", () => {
  time = defaultTime;
  update();
  startTimer();
});

// เลือกเวลา
function selectTime(sec, e) {
  e.stopPropagation();

  defaultTime = sec;
  time = sec;
  update();

  document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
  e.target.classList.add("active");
}

// หมุนจอ
function handleRotate() {
  const el = document.getElementById("time");
  if (window.innerWidth > window.innerHeight) {
    el.classList.add("flip");
  } else {
    el.classList.remove("flip");
  }
}

window.addEventListener("resize", handleRotate);

// ✅ กันหน้าจอดับ
let wakeLock = null;
async function keepAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch (err) {}
}
document.body.addEventListener("click", keepAwake);

// init
update();
handleRotate();
</script>

<!-- ✅ Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
